<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Form</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="order-form.css">
</head>
<body>
    <form>
        <div class="bage-icon">
        <i class="fa-solid fa-bag-shopping"></i>
        </div>
        <h1>Order Now</h1>
        <p>Fill in the details bleow to place your order</p>
        <div class="container">
            <div class="row-1">
            <div class="fieldset">
            <label for="full-name">Full Name</label>
            <input type="text" name="full-name" id="full-name" placeholder="Enter your full name">
            <i class="fa-solid fa-user"></i>
            </div>

            <div class="fieldset">
            <label for="number">Full Name</label>
            <input type="number" name="number" id="number" placeholder="Enter your phone number">
            <i class="fa-solid fa-phone"></i>
            </div>
            </div>

            <div class="row-1">
            <div class="fieldset">
            <label for="email">E-mail Adress <span>(Optional)</span></label>
            <input type="email" name="email" id="email" placeholder="enter your email address">
            <i class="fa-solid fa-envelope"></i>
            </div>

            <div class="fieldset">
            <label for="textarea">Delivery Address</label>
            <textarea name="text" id="textarea" placeholder="Enter your complete delivery address"></textarea>
            <i class="fa-solid fa-location-dot"></i>
            </div>
            </div>

            <div class="row-2">
                <div class="fieldset-select">
                    <label for="city">City</label>
                    <select id="city">
                        <option value="karachi">Karachi</option>
                        <option value="Lahore">Lahore</option>
                        <option value="Rawalpindi">Rawalpindi</option>
                        <option value="Multan">Multan</option>
                        <option value="Islamabad">Islamabad</option>
                    </select>
                    <i class="fa-solid fa-city"></i>
                </div>

                <div class="fieldset-select">
                    <label for="state">State</label>
                    <select id="state">
                        <option value="Sindh">Sindh</option>
                        <option value="Punjab">Punjab</option>
                        <option value="KPK">KPK</option>
                        <option value="Balochistan">Balochistan</option>
                    </select>
                    <i class="fa-solid fa-map"></i>
                </div>

                <div class="fieldset">
                    <label for="pincode">Pincode</label>
                    <input type="text" name="" id="pincode">
                    <i class="fa-solid fa-location-dot"></i>
                </div>
            </div>

            <div class="row-3">

            <div class="fieldset-select">
                <label for="product">Product / Service</label>
                <select id="product" name="coffee" required>
                    <option value=""disabled selected hidden style="color: red;">Select Product or Service</option>
                    <option value="Espresso">Espresso</option>
                    <option value="Cappuccino">Cappuccino</option>
                    <option value="Latte">Latte</option>
                    <option value="Iced Latte">Iced Latte</option>
                    <option value="Frappé">Frappé</option>
                    <option value="Croissant">Croissant</option>
                    <option value="Chocolate Brownie">Chocolate Brownie</option>
                    <option value="Blueberry Muffin">Blueberry Muffin</option>
                </select>
                <img src="./icon 1.png" alt="">

            </div>

            <div class="fieldset">
                <label for="quntity">Quantity</label>
                <input type="number" name="" id="quntity" style="">
            </div>
            </div>

            <div class="row-4">
                <div class="fieldset">
                <label for="order-notes">Order Notes <span>(optional)</span></label>
                <textarea type="text" name="" id="order-notes" placeholder="Any spacial instructions for your order?"></textarea>
                <img src="./icon 2.png" alt="">
            </div>
            </div>

            <div class="row-5">
                <div class="order-now-btn">
                    <button type="submit">
                        <i class="fa-solid fa-cart-shopping"></i> 
                        Order Now
                    </button>
                </div>
            </div>

            <div class="last-line">
                <div class="last-div">
                <i class="fa-solid fa-shield-halved"></i>
                <p>Your information is safe and secure</p>
            </div>
            </div>
        </div>
    </form>
</body>
</html>
